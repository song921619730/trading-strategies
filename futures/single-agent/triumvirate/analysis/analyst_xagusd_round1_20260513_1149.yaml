    - "Copper at all-time highs provides fundamental support for silver (industrial demand). A break above 87.82 could trigger a short squeeze toward 90+."
    - "Iran geopolitical uncertainty (Strait of Hormuz, Trump-Xi summit) supports precious metals as safe havens — bullish tailwind for silver."
    - "Today's PPI release (8:30 AM ET) is a macro event risk that could drive directional moves regardless of technical structure."
    - "The 83.03 support held on the May 12 sell-off — a strong floor limits downside potential for a sustained breakdown."
    - "Volume on the recovery was generally lower than the initial sell-off volume, suggesting the bounce lacked conviction compared to the prior distribution."
  verdict: PASS
